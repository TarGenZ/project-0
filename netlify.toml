[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# react-router-dom handles routing client-side, so every non-API path needs
# to load index.html and let the router take over — otherwise a direct
# link or refresh on e.g. /dashboard 404s before React ever mounts.
# API routes are excluded so they still hit the actual functions instead of
# getting swallowed by this catch-all.
[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
